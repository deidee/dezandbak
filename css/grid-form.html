<!doctype html>
<html dir="ltr" lang="en">
<head>
    <meta charset="utf-8">
    <title>Grid Form</title>
    <style>

        * {
            border: 0;
            margin: 0;
            outline: 0;
            padding: 0;
        }

        :root {
            --grid: 24px;

            --font-size: 16px;
            --line: 24px;

            --border: 1px;
            --radius: 0;

            /* shorter controls inside the grid rhythm */
            --control-height: 36px;
            --control-gap: 6px;

            --pad-x: 12px;

            --space-1: 24px;
            --space-2: 48px;
            --space-3: 72px;
        }

        /* Debug baseline overlay */
        .form-debug-grid {
            background-image: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.12) 0,
                    rgba(0, 0, 0, 0.12) 1px,
                    transparent 1px,
                    transparent var(--grid)
            );
            background-size: 100% var(--grid);
        }

        .form-grid {
            font-size: var(--font-size);
            line-height: var(--line);
            max-width: 40rem;
        }

        .form-grid,
        .form-grid * {
            box-sizing: border-box;
        }

        .form-grid fieldset {
            margin: 0 0 var(--space-1);
            border: var(--border) solid currentColor;
            padding: calc(var(--space-1) - var(--border)) var(--pad-x)
            calc(var(--space-1) - var(--border));
        }

        .form-grid legend,
        .form-grid label,
        .form-grid .help,
        .form-grid .error {
            display: block;
            margin: 0;
            font: inherit;
            line-height: var(--line);
        }

        .form-grid legend {
            padding: 0 6px;
        }

        .form-row {
            margin: 0 0 var(--space-1);
        }

        /* Keeps the whole field on the 24px rhythm */
        .form-row > .control {
            padding-top: var(--control-gap);
            padding-bottom: var(--control-gap);
        }

        .form-grid input,
        .form-grid textarea,
        .form-grid select,
        .form-grid button {
            font: inherit;
            color: inherit;
        }

        /* Text-like controls */
        .form-grid input:not([type="checkbox"]):not([type="radio"]),
        .form-grid select:not([multiple]),
        .form-grid button {
            display: block;
            width: 100%;
            height: var(--control-height);
            margin: 0;
            padding: 0 var(--pad-x);
            line-height: calc(var(--control-height) - (var(--border) * 2));
            border: var(--border) solid currentColor;
            border-radius: var(--radius);
            background: transparent;
        }

        /* Single select often needs a tiny bit of right padding */
        .form-grid select:not([multiple]) {
            padding-right: calc(var(--pad-x) * 2);
        }

        /* Textarea sits on the baseline grid internally */
        .form-grid textarea {
            display: block;
            width: 100%;
            margin: 0;
            min-height: calc(var(--grid) * 4 - (var(--control-gap) * 2)); /* 84px */
            padding:
                    calc((var(--grid) - var(--font-size)) / 2 - var(--border))
                    var(--pad-x);
            line-height: var(--line);
            border: var(--border) solid currentColor;
            border-radius: var(--radius);
            background: transparent;
            resize: vertical;
        }

        /* Multi-select should expose several 24px rows */
        .form-grid select[multiple] {
            display: block;
            width: 100%;
            margin: 0;
            min-height: calc(var(--grid) * 5 - (var(--control-gap) * 2)); /* 108px */
            padding: 0;
            line-height: var(--line);
            border: var(--border) solid currentColor;
            border-radius: var(--radius);
            background: transparent;
        }

        .form-grid select[multiple] option {
            line-height: var(--line);
            min-height: var(--line);
            padding: 0 var(--pad-x);
        }

        /* Checkbox / radio rows */
        .form-check {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-height: var(--grid);
            margin: 0 0 var(--space-1);
        }

        .form-check .control {
            padding-top: 0;
            padding-bottom: 0;
        }

        .form-check input[type="checkbox"],
        .form-check input[type="radio"] {
            width: var(--grid);
            height: var(--grid);
            margin: 0;
            flex: 0 0 var(--grid);
            accent-color: currentColor;
        }

        .form-check label {
            flex: 1;
            margin: 0;
        }

        /* Optional stacked checkbox/radio groups */
        .form-choice-group {
            margin: 0 0 var(--space-1);
        }

        .form-choice-group > .group-label {
            margin: 0;
        }

        .form-choice-group > .choices {
            padding-top: var(--control-gap);
            padding-bottom: var(--control-gap);
        }

        /* Help and errors stay on the grid */
        .form-grid .help,
        .form-grid .error {
            font-size: 14px;
            line-height: var(--line);
        }

        .form-grid .error {
            color: #b00020;
        }

        .form-grid .actions {
            margin-top: var(--space-2);
        }

        .form-grid button {
            cursor: pointer;
        }

    </style>
</head>
<body>
<form class="form-grid form-debug-grid">
    <div class="form-row">
        <label for="name">Name</label>
        <div class="control">
            <input id="name" name="name" type="text">
        </div>
    </div>

    <div class="form-row">
        <label for="country">Country</label>
        <div class="control">
            <select id="country" name="country">
                <option>Netherlands</option>
                <option>Belgium</option>
                <option>Germany</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <label for="tags">Tags</label>
        <div class="control">
            <select id="tags" name="tags[]" multiple>
                <option>Art</option>
                <option>Design</option>
                <option>Code</option>
                <option>Poetry</option>
                <option>Music</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <label for="message">Message</label>
        <div class="control">
            <textarea id="message" name="message"></textarea>
        </div>
    </div>

    <div class="form-check">
        <input id="terms" name="terms" type="checkbox">
        <label for="terms">I agree to the terms</label>
    </div>

    <fieldset class="form-choice-group">
        <legend class="group-label">Preferred contact</legend>
        <div class="choices">
            <div class="form-check">
                <input id="contact-email" name="contact" type="radio" value="email">
                <label for="contact-email">Email</label>
            </div>

            <div class="form-check">
                <input id="contact-phone" name="contact" type="radio" value="phone">
                <label for="contact-phone">Phone</label>
            </div>
        </div>
    </fieldset>

    <div class="actions">
        <button type="submit">Send</button>
    </div>
</form>
</body>
</html>
